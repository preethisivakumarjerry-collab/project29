<!DOCTYPE html>
<html lang="en">
<head>
  <title>Navbar</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      height: 200vh;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#1d2b64,#f8cdda);
      color: white;
    }

    .section {
      margin: 40px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    /* 🔥 COMMON ANIMATION */
    .nav-link {
      color: white !important;
      transition: 0.3s;
      position: relative;
    }

    .nav-link:hover {
      color: #ffd369 !important;
      transform: translateY(-3px);
      text-shadow: 0 0 10px #ffd369;
    }

    /* underline animation */
    .nav-link::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 3px;
      background: #ffd369;
      left: 0;
      bottom: -5px;
      transition: 0.4s;
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      width: 100%;
    }

    /* 🔥 NAVBAR ENTRY */
    .navbar {
      animation: slideDown 0.7s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* 🔥 DROPDOWN */
    .dropdown-menu {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 🔥 GLASS NAVBAR */
    .glass {
      background: rgba(0,0,0,0.5) !important;
      backdrop-filter: blur(10px);
    }

    /* 🔥 SCROLL CHANGE */
    .scrolled {
      background: #000 !important;
      transition: 0.4s;
    }

  </style>
</head>

<body>

<h2 class="text-center mt-3">🔥Navbar</h2>

<!-- 1 Basic -->
<div class="section">
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
  <a class="navbar-brand">Basic</a>
</nav>
</div>

<!-- 2 Color -->
<div class="section">
<nav class="navbar navbar-dark bg-primary"><a class="navbar-brand">Primary</a></nav>
<br>
<nav class="navbar navbar-dark bg-success"><a class="navbar-brand">Success</a></nav>
</div>

<!-- 3 Light -->
<div class="section">
<nav class="navbar navbar-light bg-light">
  <a class="navbar-brand">Light</a>
</nav>
</div>

<!-- 4 Fixed -->
<nav class="navbar navbar-dark bg-dark fixed-top" id="scrollNav">
  <a class="navbar-brand">Scroll Nav</a>
</nav>

<!-- 5 Form -->
<div class="section">
<nav class="navbar navbar-dark bg-dark">
  <form class="form-inline ml-auto">
    <input class="form-control mr-2" placeholder="Search">
    <button class="btn btn-success">Go</button>
  </form>
</nav>
</div>

<!-- 6 Dropdown -->
<div class="section">
<nav class="navbar navbar-dark bg-info">
  <ul class="navbar-nav">
    <li class="nav-item dropdown">
      <a class="nav-link dropdown-toggle" data-toggle="dropdown">Menu</a>
      <div class="dropdown-menu">
        <a class="dropdown-item">Profile</a>
        <a class="dropdown-item">Settings</a>
      </div>
    </li>
  </ul>
</nav>
</div>

<!-- 7 Icons -->
<div class="section">
<nav class="navbar navbar-dark bg-dark">
  <ul class="navbar-nav ml-auto">
    <li class="nav-item"><a class="nav-link"><i class="bi bi-house"></i></a></li>
    <li class="nav-item"><a class="nav-link"><i class="bi bi-person"></i></a></li>
  </ul>
</nav>
</div>

<!-- 8 Alignment -->
<div class="section">
<nav class="navbar navbar-dark bg-dark justify-content-center">
  <a class="navbar-brand">Center</a>
</nav>
</div>

<!-- 9 Collapse -->
<div class="section">
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
  <button class="navbar-toggler" data-toggle="collapse" data-target="#menu">
    ☰
  </button>
  <div class="collapse navbar-collapse" id="menu">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link">Home</a></li>
    </ul>
  </div>
</nav>
</div>

<!-- 10 Glass -->
<div class="section">
<nav class="navbar navbar-expand-md navbar-dark glass">
  <a class="navbar-brand">Glass Effect</a>
</nav>
</div>

<script>
  // scroll color change
  window.addEventListener("scroll", function() {
    let nav = document.getElementById("scrollNav");
    nav.classList.toggle("scrolled", window.scrollY > 50);
  });
</script>

</body>
</html>
